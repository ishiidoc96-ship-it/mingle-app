<body class="bg-surface text-on-surface min-h-screen flex flex-col md:flex-row antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Decorative Left Side for Desktop (Image) -->
<div class="hidden md:block w-1/2 relative bg-surface-variant overflow-hidden shadow-2xl z-10">
<div class="absolute inset-0 bg-cover bg-center object-cover" data-alt="A modern, high-end lifestyle photograph of a group of diverse young adults laughing and socializing in a chic, brightly lit urban cafe. The aesthetic is vibrant and optimistic, featuring light-mode friendly soft whites and greys with subtle pops of deep magenta and bright gold accents in their clothing and accessories, reflecting a premium social ecosystem." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCum4CCjYaXdxwWvz2_t2MWc-I7YF_9LptdVNFSHf_WB6x0OAWaFpQ7v8V8W78pTN78VczXZ2hPRKO9ZsQcZSMoKZ2XQwdhVe83uVYmGsoJRt-dTLxRp2Xudpkacogvct4FAYOu5aXA7k3uFanFo0aEIEPS1jKQqWngPRB3I7ix-1-BQJuprFg7q7QAlgGotsmZSEol9I2fr8Kv3kYsBmksqVyWhvM8tc1glfBmAN-6SMKQWdy3DHHiM_jaAilxGikRy5pHdbqfWIjS')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface-variant/80 to-transparent"></div>
<div class="absolute bottom-12 left-12 max-w-md">
<h1 class="font-headline-xl text-headline-xl text-surface mb-4">Connect.<br/>Engage.<br/>Earn.</h1>
<p class="font-body-lg text-body-lg text-surface-container-low opacity-90">Join the exclusive social network where your interactions generate real value.</p>
</div>
</div>
<!-- Main Content Area -->
<main class="w-full md:w-1/2 flex-1 flex flex-col justify-center px-gutter py-md relative z-20 md:min-h-screen">
<!-- Mobile Header Spacer (Nav is suppressed as per rules for transactional page) -->
<div class="md:hidden pt-8"></div>
<div class="w-full max-w-[440px] mx-auto bg-surface-container-lowest md:bg-transparent md:shadow-none shadow-[0_4px_20px_rgba(0,0,0,0.05)] rounded-2xl p-md md:p-0 relative">
<!-- Brand Logo (Mobile only, simplified) -->
<div class="mb-8 md:hidden text-center">
<span class="font-headline-md text-headline-md font-bold text-primary">Mingle</span>
</div>
<!-- Headers -->
<div class="mb-10 text-center md:text-left">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Join the community and start earning.</p>
</div>
<!-- Sign Up Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="name">Full Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline transition-colors" id="name" name="name" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline transition-colors" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
</div>
<!-- Phone Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="phone">Phone Number</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">phone</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline transition-colors" id="phone" name="phone" placeholder="(555) 123-4567" required="" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock_clock</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 border border-surface-variant rounded-xl focus:ring-1 focus:ring-primary focus:border-primary bg-surface-container-lowest text-on-surface font-body-md text-body-md placeholder-outline transition-colors" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start mt-4">
<div class="flex items-center h-5">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline rounded bg-surface-container-lowest" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-body-md text-on-surface-variant text-sm" for="terms">I agree to the <a class="text-primary hover:text-primary-container font-semibold transition-colors" href="#">Terms of Service</a> and <a class="text-primary hover:text-primary-container font-semibold transition-colors" href="#">Privacy Policy</a>.</label>
</div>
</div>
<!-- Primary Button -->
<button class="w-full flex justify-center py-4 px-4 rounded-xl shadow-[0_10px_30px_rgba(216,27,96,0.2)] font-label-md text-label-md text-on-primary bg-gradient-to-b from-primary-container to-tertiary hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary active:scale-[0.98] transition-all duration-200" type="submit">
                    Continue
                </button>
</form>
<!-- Footer Login Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-semibold text-primary hover:text-primary-container transition-colors" href="#">Login</a>
</p>
</div>
</div>

<div class="md:hidden pb-12"></div>
