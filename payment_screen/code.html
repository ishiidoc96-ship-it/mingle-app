<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background min-h-screen font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container flex flex-col">
<!-- Top Navigation (Contextual: Back Button since it's a linear flow) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md shadow-sm h-16 flex items-center px-gutter mx-auto max-w-container-max">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95 text-on-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface flex-1 text-center pr-10">Checkout</h1>
</header>
<main class="flex-1 w-full max-w-[800px] mx-auto px-gutter pt-24 pb-32">
<!-- Order Summary Card -->
<section class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Order Summary</h2>
<div class="bg-surface-container-lowest rounded-[24px] p-md shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant/30 flex items-center justify-between">
<div>
<p class="font-body-md text-body-md text-on-surface">Membership Fee</p>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Premium Access</p>
</div>
<div class="font-headline-lg-mobile text-headline-lg-mobile text-primary">
                    KSh 100
                </div>
</div>
</section>
<!-- Payment Methods -->
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-sm">Select Payment Method</h2>
<form class="space-y-sm" id="payment-form">
<!-- M-Pesa Option -->
<label class="block cursor-pointer group">
<input checked="" class="peer sr-only" name="payment_method" type="radio" value="mpesa"/>
<div class="bg-surface-container-lowest rounded-xl p-sm flex items-center gap-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-container/5 transition-all shadow-sm hover:shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<div class="w-12 h-12 rounded-lg bg-[#4CAF50]/10 flex items-center justify-center text-[#4CAF50]">
<span class="material-symbols-outlined filled">phone_iphone</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">M-Pesa</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Pay via Safaricom</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
</div>
</div>
</label>
<!-- Airtel Money Option -->
<label class="block cursor-pointer group">
<input class="peer sr-only" name="payment_method" type="radio" value="airtel"/>
<div class="bg-surface-container-lowest rounded-xl p-sm flex items-center gap-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-container/5 transition-all shadow-sm hover:shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<div class="w-12 h-12 rounded-lg bg-[#E53935]/10 flex items-center justify-center text-[#E53935]">
<span class="material-symbols-outlined filled">payments</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Airtel Money</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Pay via Airtel</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</div>
</label>
<!-- Card Option -->
<label class="block cursor-pointer group">
<input class="peer sr-only" name="payment_method" type="radio" value="card"/>
<div class="bg-surface-container-lowest rounded-xl p-sm flex items-center gap-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary-container/5 transition-all shadow-sm hover:shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<div class="w-12 h-12 rounded-lg bg-tertiary-container/20 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined filled">credit_card</span>
</div>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-on-surface">Credit/Debit Card</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Visa, Mastercard</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary scale-0 transition-transform"></div>
</div>
</div>
</label>
</form>
</section>
</main>
<!-- Fixed Bottom CTA -->
<div class="fixed bottom-0 w-full z-50 bg-surface/90 backdrop-blur-lg border-t border-outline-variant/30 pb-safe p-gutter shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<div class="max-w-container-max mx-auto flex items-center gap-sm">
<button class="flex-1 h-[56px] rounded-xl bg-gradient-to-b from-primary to-tertiary text-on-primary font-label-md text-label-md shadow-[0_10px_30px_rgba(216,27,96,0.2)] hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">lock</span>
                Pay KSh 100
            </button>
</div>
</div>
<script>
        // Simple script to handle visual update for custom radio buttons if needed beyond CSS
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove active scale from all dots
                document.querySelectorAll('.peer-checked\\:scale-100').forEach(dot => {
                    dot.classList.remove('peer-checked:scale-100', 'scale-100');
                    dot.classList.add('scale-0');
                });
                
                // Add active scale to the selected one
                const currentDot = e.target.nextElementSibling.querySelector('div > div');
                if(currentDot) {
                    currentDot.classList.remove('scale-0');
                    currentDot.classList.add('scale-100');
                }
            });
        });
        
        // Initial setup for checked state
        const checkedRadio = document.querySelector('input[type="radio"]:checked');
        if(checkedRadio) {
             const currentDot = checkedRadio.nextElementSibling.querySelector('div:last-child > div');
             if(currentDot) {
                 currentDot.classList.remove('scale-0');
                 currentDot.classList.add('scale-100');
             }
        }
    </script>
</body></html>
