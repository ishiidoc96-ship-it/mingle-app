                      "secondary-fixed-dim": "#e9c400",
                      "surface-container-low": "#f3f3f3",
                      "inverse-on-surface": "#f1f1f1",
                      "secondary": "#705d00",

                      "inverse-primary": "#ffb2bf",

                      "secondary-container": "#fcd400",
                      "inverse-surface": "#2f3131",
                      "error": "#ba1a1a",

                      "outline-variant": "#e3bdc3",

                      "surface-dim": "#dadada",
                      "tertiary-container": "#a941c4",

                      "md": "24px",

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        
        .gradient-btn {
            background: linear-gradient(180deg, theme('colors.primary-container'), theme('colors.tertiary'));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md antialiased overflow-hidden flex items-center justify-center relative">
<!-- Ambient Background Graphic -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[70vw] h-[70vw] rounded-full bg-primary-fixed-dim/30 blur-[120px] mix-blend-multiply opacity-70"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed-dim/30 blur-[100px] mix-blend-multiply opacity-60"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md mx-auto px-gutter py-lg">
<!-- Glassmorphism Card -->
<div class="glass-panel rounded-[24px] shadow-[0_10px_30px_rgba(216,27,96,0.1)] border border-surface-variant overflow-hidden p-md md:p-lg flex flex-col items-center">
<!-- Brand Mark -->
<div class="mb-8 w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container shadow-sm border border-primary-fixed/50">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- Header -->
<div class="text-center mb-8 w-full">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2 tracking-tight">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Login to your Mingle account.</p>
</div>
<!-- Form -->
<form action="#" class="w-full space-y-6 flex flex-col" id="login-form" method="POST">
<div class="space-y-4 w-full">
<!-- Email/Phone Field -->
<div class="relative w-full">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1" for="identifier">Email or Phone</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface rounded-xl border border-surface-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 shadow-sm" id="identifier" name="identifier" placeholder="Enter your email or phone" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="relative w-full">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1 ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface rounded-xl border border-surface-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all duration-200 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 shadow-sm" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors outline-none focus:outline-none" id="toggle-password" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end w-full">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors duration-200" href="#">Forgot Password?</a>
</div>
<!-- Actions -->
<div class="w-full flex flex-col gap-4 mt-2">
<button class="w-full h-[56px] gradient-btn text-on-primary font-label-md text-label-md rounded-xl shadow-[0_4px_14px_rgba(216,27,96,0.3)] hover:shadow-[0_6px_20px_rgba(216,27,96,0.4)] hover:-translate-y-[1px] active:translate-y-[1px] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant/60">or</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<a class="w-full h-[56px] bg-transparent border-[1.5px] border-primary/20 text-primary font-label-md text-label-md rounded-xl hover:bg-primary/5 hover:border-primary/50 active:bg-primary/10 transition-all duration-200 flex items-center justify-center" href="#">
                        Create Account
                    </a>
</div>
</form>
</div>
<!-- Footer Meta -->
<div class="mt-8 text-center text-on-surface-variant/60 font-label-sm text-label-sm w-full">
            By logging in, you agree to our <a class="text-primary hover:underline" href="#">Terms</a> &amp; <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</div>
</main>
<script>
        // Micro-interaction for password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const togglePasswordBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            const toggleIcon = togglePasswordBtn.querySelector('.material-symbols-outlined');

            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
                
                // Add a subtle pop animation to the icon
                toggleIcon.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    toggleIcon.style.transform = 'scale(1)';
                    toggleIcon.style.transition = 'transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                }, 50);
            });
            
            // Subtle form entrance animation
            const formContainer = document.querySelector('.glass-panel');
            formContainer.style.opacity = '0';
            formContainer.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                formContainer.style.transition = 'opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                formContainer.style.opacity = '1';
                formContainer.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
