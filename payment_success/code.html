<style>
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 20px;
            background-color: #fcd400;
            top: -20px;
            opacity: 0;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        .success-circle-reveal {
            animation: scaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .success-icon-reveal {
            opacity: 0;
            transform: scale(0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            70% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }
    </style>

<script>
        // Simple Confetti Generator
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#d81b60', '#8d22a9', '#fcd400', '#ffd9de', '#a941c4'];
            const shapes = ['rect', 'circle'];
            
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                
                // Randomize properties
                const left = Math.random() * 100;
                const width = Math.random() * 8 + 6;
                const height = shapes[Math.floor(Math.random() * shapes.length)] === 'circle' ? width : Math.random() * 10 + 10;
                const bg = colors[Math.floor(Math.random() * colors.length)];
                const delay = Math.random() * 2;
                const duration = Math.random() * 2 + 2;
                
                // Apply styles
                confetti.style.left = `${left}vw`;
                confetti.style.width = `${width}px`;
                confetti.style.height = `${height}px`;
                confetti.style.backgroundColor = bg;
                confetti.style.borderRadius = width === height ? '50%' : '2px';
                confetti.style.animation = `confettiFall ${duration}s ease-in ${delay}s forwards`;
                
                container.appendChild(confetti);
            }
        }

        // Initialize confetti on load
        window.addEventListener('DOMContentLoaded', createConfetti);
    </script>
